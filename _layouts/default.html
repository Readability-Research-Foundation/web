<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <meta name="theme-color" content="#4f3f75">

  <title>
    {% if page.title %}{{ page.title }} | {% endif %}Readability Research Foundation
  </title>

  <link rel="stylesheet" href="https://unpkg.com/bulma@1.0.4/css/bulma.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  {{ content }}

  <footer class="footer site-footer">
    <div class="content has-text-centered">
      <p>© 2026 Readability Research Foundation. All rights reserved.</p>
    </div>
  </footer>

  <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
</body>
</html>
